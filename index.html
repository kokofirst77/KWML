    <!-- Firebase SDK (실시간 피드·사진 공유용) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, onSnapshot,
            doc, updateDoc, setDoc, getDoc, increment, arrayUnion, arrayRemove
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

        const fbConfig = window.KWLMLAB_CONFIG?.firebase;
        if (fbConfig && fbConfig.projectId) {
            try {
                const app = initializeApp(fbConfig);
                window._db      = getFirestore(app);
                window._storage = getStorage(app);
                window._firestoreFns = {
                    collection, addDoc, onSnapshot,
                    doc, updateDoc, setDoc, getDoc,
                    increment, arrayUnion, arrayRemove
                };
                window._storageFns   = { ref, uploadBytes, getDownloadURL };
                window._firebaseReady = true;
            } catch (e) {
                console.warn('Firebase 초기화 실패:', e);
                window._firebaseReady = false;
            }
        } else {
            window._firebaseReady = false;
        }
    </script>
